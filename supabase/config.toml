# Supabase local development configuration.
# Docs: https://supabase.com/docs/guides/local-development/cli/config
# `project_id` is the local stack name; link to your hosted project with
# `supabase link --project-ref <ref>`.

project_id = "hrms-uae"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# Canonical site URL; additional redirect URLs (e.g. Vercel previews) go below.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
enable_signup = false # users are provisioned by HR admins, not self-signup

[auth.email]
enable_signup = false
enable_confirmations = true

[storage]
enabled = true
file_size_limit = "50MiB"
